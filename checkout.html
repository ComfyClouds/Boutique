<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout – Lovers Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#F5EFE0;--warm-white:#FAF6EE;--bark:#6B4F35;--moss:#6B7A5A;--clay:#B07D5C;--sand:#D4B896;--charcoal:#2C2416;--gold:#C9A84C;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--warm-white);color:var(--charcoal);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;}
    body.ar{font-family:'Amiri',serif;direction:rtl;}
    nav{background:var(--warm-white);border-bottom:1px solid rgba(107,79,53,0.12);padding:20px 60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;text-decoration:none;color:var(--charcoal);}
    .nav-brand em{font-style:italic;color:var(--bark);}
    .lang-toggle{display:flex;gap:6px;}
    .lang-btn{background:transparent;border:1px solid var(--bark);color:var(--bark);padding:5px 12px;font-size:11px;letter-spacing:1.5px;cursor:pointer;font-family:'Lato',sans-serif;transition:all 0.3s;}
    .lang-btn.active,.lang-btn:hover{background:var(--bark);color:var(--cream);}
    .back-btn{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;color:var(--clay);display:flex;align-items:center;gap:8px;}
    .page-header{background:var(--cream);padding:50px 60px 36px;border-bottom:1px solid rgba(107,79,53,0.1);}
    .breadcrumb{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);margin-bottom:12px;}
    .breadcrumb a{color:var(--clay);text-decoration:none;}
    .page-header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,48px);font-weight:300;}
    .page-header h1 em{font-style:italic;color:var(--bark);}
    .checkout-layout{display:grid;grid-template-columns:1fr 400px;gap:60px;padding:60px;max-width:1400px;margin:0 auto;}
    .form-section{margin-bottom:48px;}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--bark);margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid rgba(107,79,53,0.15);display:flex;align-items:center;gap:12px;}
    .section-num{width:28px;height:28px;background:var(--bark);color:var(--cream);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'Lato',sans-serif;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    .form-row.single{grid-template-columns:1fr;}
    .form-group label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--clay);display:block;margin-bottom:8px;font-weight:400;}
    .form-group input, .form-group select, .form-group textarea{border:1px solid rgba(107,79,53,0.2);background:var(--warm-white);padding:16px;font-family:'Lato',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color 0.3s;}
    .form-group input:focus{border-color:var(--bark);}
    .form-group input.error{border-color:#C0554A;}
    .payment-option{display:flex;align-items:center;gap:16px;padding:20px;border:1px solid rgba(107,79,53,0.2);cursor:pointer;margin-bottom:12px;transition:all 0.3s;}
    .payment-option.selected{border-color:var(--bark);background:rgba(107,79,53,0.05);}
    .order-summary-checkout{background:var(--cream);padding:48px;height:fit-content;position:sticky;top:100px;}
    .summary-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(107,79,53,0.08);font-size:14px;}
    .summary-item-img{width:50px;height:60px;background:var(--sand);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .summary-item-qty{background:var(--bark);color:var(--cream);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;position:relative;top:-20px;right:-10px;z-index:1;margin-left:-22px;}
    body.ar .summary-item-qty{right:auto;left:-10px;margin-left:0;margin-right:-22px;}
    .summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;}
    .summary-divider{height:1px;background:rgba(107,79,53,0.15);margin:24px 0;}
    .summary-total{display:flex;justify-content:space-between;font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--charcoal);}
    .place-order-btn{display:block;width:100%;margin-top:32px;background:var(--bark);color:var(--cream);border:none;padding:22px;cursor:pointer;font-size:11px;letter-spacing:3px;text-transform:uppercase;transition:all 0.3s;}
    .processing-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,0.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:24px;backdrop-filter:blur(4px);}
    .processing-overlay.show{display:flex;}
    .spinner{width:50px;height:50px;border:3px solid rgba(245,239,224,0.2);border-top-color:var(--cream);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: var(--charcoal); color: var(--cream); padding: 16px 28px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left: 4px solid #C0554A; }
    .toast.success { border-left: 4px solid var(--moss); }
    body.ar .toast.error { border-left: none; border-right: 4px solid #C0554A; }
    body.ar .toast.success { border-left: none; border-right: 4px solid var(--moss); }

    @media(max-width:1100px){.checkout-layout{grid-template-columns:1fr;}.order-summary-checkout{position:static;}}
  </style>
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<div class="processing-overlay" id="processing-overlay">
  <div class="spinner"></div>
  <div class="processing-text" style="color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:24px;" data-en="Arranging your blooms…" data-ar="نحن نجهز باقتك…">Arranging your blooms…</div>
</div>

<nav>
  <a href="index.html" class="nav-brand"><em>Lovers</em> Boutique</a>
  <div class="nav-actions">
    <a href="cart.html" class="back-btn" data-en="← Review Cart" data-ar="→ مراجعة السلة">← Review Cart</a>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
      <button class="lang-btn" onclick="setLang('ar')" id="btn-ar">ع</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb">
    <a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a> /
    <a href="cart.html" data-en="Cart" data-ar="السلة">Cart</a> /
    <span data-en="Checkout" data-ar="الدفع">Checkout</span>
  </div>
  <h1 data-en="Complete your <em>Order</em>" data-ar="إتمام <em>طلبك</em>">Complete your <em>Order</em></h1>
</div>

<div class="checkout-layout">
  <div class="checkout-form-col">
    <div class="form-section">
      <div class="section-title"><span class="section-num">1</span> <span data-en="Personal Information" data-ar="البيانات الشخصية">Personal Information</span></div>
      <div class="form-row">
        <div class="form-group"><label data-en="First Name" data-ar="الاسم الأول">First Name</label><input type="text" id="firstName" placeholder="Name"></div>
        <div class="form-group"><label data-en="Last Name" data-ar="الاسم الأخير">Last Name</label><input type="text" id="lastName" placeholder="Last Name"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label data-en="Phone Number" data-ar="رقم الهاتف">Phone Number</label><input type="tel" id="phone" placeholder="01xxxxxxxxx"></div>
        <div class="form-group"><label data-en="Email Address" data-ar="البريد الإلكتروني">Email Address</label><input type="email" id="email" placeholder="email@example.com"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title"><span class="section-num">2</span> <span data-en="Delivery Address" data-ar="عنوان التوصيل">Delivery Address</span></div>
      <div class="form-row single"><div class="form-group"><label data-en="Full Address" data-ar="العنوان بالتفصيل">Full Address</label><input type="text" id="address" placeholder="Building, Street, Floor..."></div></div>
      <div class="form-row">
        <div class="form-group">
          <label data-en="City" data-ar="المدينة">City</label>
          <select id="city" onchange="updateCityData()">
            <option value="Cairo">Cairo</option><option value="Giza">Giza</option>
            <option value="Helwan">Helwan</option><option value="Kerdasa">Kerdasa</option>
            <option value="Al Saf">Al Saf</option><option value="Al Ayat">Al Ayat</option>
            <option value="Damietta">Damietta</option><option value="Gharbia">Gharbia</option>
            <option value="Beheira">Beheira</option><option value="Dakahlia">Dakahlia</option>
            <option value="Qalyubia">Qalyubia</option><option value="Sharqia">Sharqia</option>
            <option value="Alexandria">Alexandria</option><option value="Kafr El Sheikh">Kafr El Sheikh</option>
            <option value="Monufia">Monufia</option><option value="Fayum">Fayum</option>
            <option value="Beni Suef">Beni Suef</option><option value="Minya">Minya</option>
            <option value="Assiut">Assiut</option><option value="Sohag">Sohag</option>
            <option value="Qena">Qena</option><option value="Luxor">Luxor</option>
            <option value="Al Wadi Al Gadid">Al Wadi Al Gadid</option>
            <option value="North & South Sinai">North & South Sinai</option>
          </select>
        </div>
        <div class="form-group"><label data-en="Delivery Date" data-ar="تاريخ التوصيل">Delivery Date</label><input type="date" id="deliveryDate"></div>
      </div>
      <div class="form-row single"><div class="form-group"><label data-en="Notes" data-ar="ملاحظات">Notes</label><textarea id="notes" rows="3" placeholder="Message for the card..."></textarea></div></div>
    </div>

    <div class="form-section">
      <div class="section-title"><span class="section-num">3</span> <span data-en="Payment Method" data-ar="طريقة الدفع">Payment Method</span></div>
      <label class="payment-option selected" onclick="selectPayment(this)"><input type="radio" name="payment" value="cash" checked> <div data-en="Cash on Delivery" data-ar="الدفع عند الاستلام">Cash on Delivery</div></label>
    </div>
  </div>

  <div class="order-summary-checkout">
    <h2 data-en="Summary" data-ar="ملخص الطلب">Summary</h2>
    <div id="co-items"></div>
    <div class="summary-divider"></div>
    <div class="form-group" style="margin-bottom: 24px;">
      <label data-en="Promo Code" data-ar="كود الخصم">Promo Code</label>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="promoInput" placeholder="...">
        <button onclick="applyPromo()" style="background:var(--bark); color:var(--cream); border:none; padding: 0 20px; cursor:pointer;" data-en="Apply" data-ar="تطبيق">Apply</button>
      </div>
      <div id="promoMsg" style="font-size: 11px; margin-top: 8px;"></div>
    </div>
    <div id="co-rows"></div>
    <div class="summary-divider"></div>
    <div class="summary-total"><span data-en="Total" data-ar="الإجمالي">Total</span><span id="co-total">0</span></div>
    <button class="place-order-btn" onclick="placeOrder()"><span data-en="Place Order Now" data-ar="تأكيد الطلب الآن">Place Order Now</span></button>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlHcwzaLAc4DxA6CLNCkyVQNNknpxldOOe1ofZLDiWpzcOIyCFzdIP_9mBgAUMvXXO/exec';
  let currentLang = localStorage.getItem('lb_lang') || 'en';
  let selectedPayment = 'cash';
  let currentDeliveryFee = 60;
  let discountAmount = 0;
  let isFreeDelivery = false;
  let appliedPromoCode = "";

  const cityData = {
    "Cairo": { fee: 60, minDays: 3 }, "Giza": { fee: 60, minDays: 3 }, "Helwan": { fee: 65, minDays: 3 },
    "Kerdasa": { fee: 65, minDays: 3 }, "Al Saf": { fee: 65, minDays: 3 }, "Al Ayat": { fee: 65, minDays: 3 },
    "Damietta": { fee: 70, minDays: 3 }, "Gharbia": { fee: 70, minDays: 4 }, "Beheira": { fee: 70, minDays: 4 },
    "Dakahlia": { fee: 70, minDays: 4 }, "Qalyubia": { fee: 70, minDays: 4 }, "Sharqia": { fee: 70, minDays: 4 },
    "Alexandria": { fee: 70, minDays: 3 }, "Kafr El Sheikh": { fee: 70, minDays: 4 }, "Monufia": { fee: 70, minDays: 4 },
    "Fayum": { fee: 90, minDays: 5 }, "Beni Suef": { fee: 90, minDays: 5 }, "Minya": { fee: 90, minDays: 5 },
    "Assiut": { fee: 90, minDays: 5 }, "Sohag": { fee: 90, minDays: 5 }, "Qena": { fee: 90, minDays: 5 },
    "Luxor": { fee: 90, minDays: 5 }, "Al Wadi Al Gadid": { fee: 100, minDays: 7 }, "North & South Sinai": { fee: 130, minDays: 7 }
  };

  function showToast(en, ar, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = currentLang === 'ar' ? ar : en;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 100);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, 4000);
  }

  function updateCityData() {
    const city = document.getElementById('city').value;
    const data = cityData[city] || cityData["Cairo"];
    currentDeliveryFee = data.fee;
    const today = new Date();
    today.setDate(today.getDate() + data.minDays);
    const dateInput = document.getElementById('deliveryDate');
    dateInput.min = today.toISOString().split('T')[0];
    dateInput.value = dateInput.min;
    renderSummary();
  }

  function getCart() { return JSON.parse(localStorage.getItem('lb_cart') || '[]'); }

  function renderSummary() {
    const cart = getCart();
    const priceLbl = currentLang === 'ar' ? 'ج.م' : 'EGP';
    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    const activeDel = isFreeDelivery ? 0 : currentDeliveryFee;
    
    document.getElementById('co-items').innerHTML = cart.map(item => {
      const name = currentLang === 'ar' ? (item.nameAr||item.name) : item.name;
      const displayImg = item.emoji || item.image || '🌸';
      const imageTag = (displayImg.includes('http')) 
          ? `<img src="${displayImg}" style="width:100%;height:100%;object-fit:cover;" alt="${name}">` 
          : `<span style="font-size:24px;">${displayImg}</span>`;

      return `<div class="summary-item"><div style="display:flex;gap:15px;align-items:center;"><div class="summary-item-img">${imageTag}</div><div class="summary-item-qty">${item.qty}</div><div>${name}</div></div><span>${item.price*item.qty} ${priceLbl}</span></div>`;
    }).join('');
    
    let rowsHtml = `<div class="summary-row"><span>Subtotal</span><span>${subtotal} ${priceLbl}</span></div>`;
    if (discountAmount > 0) rowsHtml += `<div class="summary-row" style="color:var(--moss);"><span>Discount</span><span>-${discountAmount} ${priceLbl}</span></div>`;
    rowsHtml += `<div class="summary-row"><span>Delivery</span><span>${isFreeDelivery ? 'FREE' : activeDel + ' ' + priceLbl}</span></div>`;
    
    document.getElementById('co-rows').innerHTML = rowsHtml;
    document.getElementById('co-total').textContent = `${subtotal + activeDel - discountAmount} ${priceLbl}`;
  }

  async function applyPromo() {
    const code = document.getElementById('promoInput').value.trim();
    if (!code) return;
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=validatePromo&code=${code}`);
      const data = await res.json();
      if (data.success) {
        const cart = getCart();
        const allowedIds = String(data.applicableProducts).split(',').filter(x => x);
        const eligibleItems = (data.applicableProducts === 'all') 
          ? cart 
          : cart.filter(item => allowedIds.includes(String(item.id).toLowerCase().replace(/\s/g, '')));

        if (eligibleItems.length === 0) {
          showToast("Not applicable to these products", "هذا الكود لا يشمل المنتجات المختارة", "error");
          return;
        }

        appliedPromoCode = code;
        isFreeDelivery = (data.type === 'free_delivery');
        const eligibleSubtotal = eligibleItems.reduce((s, i) => s + (i.price * i.qty), 0);
        discountAmount = (data.type === 'percentage') ? (eligibleSubtotal * data.value / 100) : (data.type === 'flat' ? Math.min(data.value, eligibleSubtotal) : 0);
        
        showToast("Promo code applied successfully", "تم تطبيق كود الخصم بنجاح", "success");
        renderSummary();
      } else { 
        showToast("Invalid promo code", "كود خصم غير صحيح", "error"); 
      }
    } catch (e) { 
      showToast("Error checking code", "خطأ في التحقق من الكود", "error"); 
    }
  }

  async function placeOrder() {
    const fields = ['firstName', 'phone', 'address', 'deliveryDate'];
    let isValid = true;
    fields.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) {
        el.classList.add('error');
        isValid = false;
      } else {
        el.classList.remove('error');
      }
    });

    if (!isValid) {
      showToast("Please fill in all required fields", "يرجى ملء جميع الحقول المطلوبة", "error");
      return;
    }

    const cart = getCart();
    if (cart.length === 0) {
      showToast("Your cart is empty", "سلة المشتريات فارغة", "error");
      return;
    }

    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    const delivery = isFreeDelivery ? 0 : currentDeliveryFee;
    const finalTotal = subtotal + delivery - discountAmount;

    // GENERATE UNIQUE ID ONCE
    const sharedOrderId = "LB-" + Date.now();

    const orderData = {
      action: 'placeOrder',
      orderId: sharedOrderId, // Sending the unique ID to your sheet
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      address: document.getElementById('address').value,
      city: document.getElementById('city').value,
      deliveryDate: document.getElementById('deliveryDate').value,
      notes: document.getElementById('notes').value,
      paymentMethod: selectedPayment,
      items: JSON.stringify(cart),
      subtotal: subtotal,
      delivery: delivery,
      discount: discountAmount,
      total: finalTotal,
      promoCode: appliedPromoCode
    };

    // SAVE DATA FOR THANKS PAGE (Using the same shared ID)
    const thanksData = {
      orderId: sharedOrderId,
      name: orderData.firstName,
      items: cart,
      total: finalTotal
    };
    localStorage.setItem('lb_last_order', JSON.stringify(thanksData));

    document.getElementById('processing-overlay').classList.add('show');
    showToast("Processing your order...", "جاري معالجة طلبك...", "success");

    try {
      await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
      localStorage.removeItem('lb_cart');
      window.location.href = 'thankyou.html';
    } catch(e) { 
      document.getElementById('processing-overlay').classList.remove('show');
      showToast("Order failed. Please try again.", "فشل الطلب. يرجى المحاولة مرة أخرى", "error");
    }
  }

  function setLang(l) { 
    currentLang = l; 
    document.body.classList.toggle('ar', l==='ar'); 
    document.querySelectorAll('[data-en]').forEach(el => el.innerHTML = el.getAttribute('data-'+l));
    renderSummary();
  }
  
  function selectPayment(el) {
    document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedPayment = el.querySelector('input').value;
  }

  updateCityData();
  setLang(currentLang);
</script>
</body>
</html>
