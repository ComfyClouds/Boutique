<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product – Lovers Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --cream:#F5EFE0;--warm-white:#FAF6EE;--bark:#6B4F35;--moss:#6B7A5A;--clay:#B07D5C;--sand:#D4B896;--charcoal:#2C2416;--gold:#C9A84C; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--warm-white);color:var(--charcoal);font-family:'Lato',sans-serif;font-weight:300;}
    body.ar{font-family:'Amiri',serif;direction:rtl;}
    nav{background:var(--warm-white);border-bottom:1px solid rgba(107,79,53,0.12);padding:20px 60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;text-decoration:none;color:var(--charcoal);}
    .nav-brand em{font-style:italic;color:var(--bark);}
    .nav-actions{display:flex;gap:20px;align-items:center;}
    .cart-btn{background:var(--bark);color:var(--cream);border:none;padding:10px 22px;cursor:pointer;font-size:12px;letter-spacing:1.5px;font-family:'Lato',sans-serif;display:flex;align-items:center;gap:8px;text-decoration:none;}
    .cart-count{background:var(--clay);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;}
    .lang-toggle{display:flex;gap:6px;}
    .lang-btn{background:transparent;border:1px solid var(--bark);color:var(--bark);padding:5px 12px;font-size:11px;letter-spacing:1.5px;cursor:pointer;font-family:'Lato',sans-serif;transition:all 0.3s;}
    .lang-btn.active,.lang-btn:hover{background:var(--bark);color:var(--cream);}

    .breadcrumb{padding:24px 60px 0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--clay);}
    .breadcrumb a{color:var(--clay);text-decoration:none;}

    .product-page{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:70vh;max-width:1200px;margin:0 auto;padding:40px 60px 80px;}
    .product-gallery{padding-right:60px;}
    body.ar .product-gallery{padding-right:0;padding-left:60px;}
    .main-image{width:100%;aspect-ratio:1;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:100px;margin-bottom:16px;position:relative;overflow:hidden;}
    .main-image img{width:100%;height:100%;object-fit:cover;}
    
    .product-details{display:flex;flex-direction:column;gap:20px;padding-left:20px;}
    body.ar .product-details{padding-left:0;padding-right:20px;}
    .product-name-big{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,48px);font-weight:300;line-height:1.1;}
    .product-price-big{font-size:28px;color:var(--bark);font-family:'Cormorant Garamond',serif;}

    /* CUSTOMIZER STYLES */
    .customizer-box { background: rgba(107,79,53,0.05); padding: 20px; border-radius: 4px; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
    .opt-group { display: flex; flex-direction: column; gap: 6px; }
    .opt-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--clay); font-weight: bold; }
    .opt-select, .opt-textarea { 
        width: 100%; padding: 10px; border: 1px solid rgba(107,79,53,0.2); 
        background: white; font-family: inherit; font-size: 14px; color: var(--charcoal);
    }
    .opt-textarea { height: 80px; resize: none; }
    
    .add-to-cart-btn{
      background:var(--bark);color:var(--cream);border:none;padding:18px;cursor:pointer;
      font-size:11px;letter-spacing:3px;text-transform:uppercase;transition:all 0.3s;width:100%;
    }
    .add-to-cart-btn:hover{background:var(--charcoal);}

    /* TOAST */
    #toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: #C94C4C; color: white; padding: 12px 24px; border-radius: 40px;
        font-size: 13px; z-index: 999; display: none; transition: all 0.3s;
    }

    @media(max-width:800px){
      .product-page{grid-template-columns:1fr;padding:24px;}
      .product-gallery{padding-right:0;margin-bottom:32px;}
      .product-details{padding-left:0;}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><em>Lovers</em> Boutique</a>
  <div class="nav-actions">
    <div class="lang-toggle">
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
      <button class="lang-btn" onclick="setLang('ar')" id="btn-ar">ع</button>
    </div>
    <a href="cart.html" class="cart-btn">
      <span data-en="Cart" data-ar="السلة">Cart</span>
      <span class="cart-count" id="cart-count">0</span>
    </a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a> / 
  <a href="shop.html" data-en="Shop" data-ar="المتجر">Shop</a> / 
  <span id="breadcrumb-name">...</span>
</div>

<div id="toast"></div>

<div id="page-content">
  <div class="loading">Loading product…</div>
</div>

<footer>
  <div class="footer-brand"><em>Lovers</em> Boutique | لوفرز بوتيك</div>
</footer>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyYgttHn568VmZxxvMb23hbz5cEwCw0a2rNUNpe4AK3XF_FnHtIJpY-48Vtiibz3iW/exec';
  let currentLang = localStorage.getItem('lb_lang') || 'en';
  let product = null;
  let options = [];
  let basePrice = 0;

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lb_lang', lang);
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.body.classList.toggle('ar', lang === 'ar');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    if (product) renderProduct();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  function updatePrice() {
    let extra = 0;
    document.querySelectorAll('.opt-select').forEach(sel => {
        const opt = sel.options[sel.selectedIndex];
        extra += parseFloat(opt.dataset.adj || 0);
    });
    const final = basePrice + extra;
    document.getElementById('display-price').textContent = final;
  }

  function renderProduct() {
    const p = product;
    const isSpecial = p.category === 'special-bouquets';
    const name = currentLang === 'ar' ? (p.nameAr || p.name) : p.name;
    const desc = currentLang === 'ar' ? (p.descAr || p.desc) : p.desc;
    
    document.getElementById('breadcrumb-name').textContent = name;
    
    // Group options by category
    const grouped = options.reduce((acc, opt) => {
        if (!acc[opt.category]) acc[opt.category] = [];
        acc[opt.category].push(opt);
        return acc;
    }, {});

    const optionsHtml = Object.keys(grouped).map(cat => `
        <div class="opt-group">
            <label class="opt-label">${cat}</label>
            <select class="opt-select" onchange="updatePrice()" data-cat="${cat}">
                ${grouped[cat].map(o => `
                    <option value="${o.name}" data-adj="${o.priceAdj}">
                        ${currentLang === 'ar' ? o.nameAr : o.name} ${o.priceAdj > 0 ? '(+' + o.priceAdj + ')' : ''}
                    </option>
                `).join('')}
            </select>
        </div>
    `).join('');

    const media = p.emoji.startsWith('http') ? `<img src="${p.emoji}">` : p.emoji;

    document.getElementById('page-content').innerHTML = `
      <div class="product-page">
        <div class="product-gallery"><div class="main-image">${media}</div></div>
        <div class="product-details">
          <h1 class="product-name-big">${name}</h1>
          <div class="product-price-big"><span id="display-price">${p.price}</span> <span>EGP</span></div>
          <p class="product-desc">${desc}</p>
          
          <div class="customizer-box">
            ${optionsHtml}
            ${isSpecial ? `
                <div class="opt-group">
                    <label class="opt-label">${currentLang === 'ar' ? 'حكاية الورد' : 'The Story'}</label>
                    <textarea class="opt-textarea" id="item-note" placeholder="${currentLang === 'ar' ? 'اكتبي الحكاية هنا...' : 'Write the story here...'}"></textarea>
                </div>
            ` : ''}
          </div>

          <button class="add-to-cart-btn" onclick="handleAddToCart()">
            ${currentLang === 'ar' ? 'أضيفي للسلة' : 'Add to Cart'}
          </button>
        </div>
      </div>
    `;
    basePrice = p.price;
    updatePrice();
  }

  function handleAddToCart() {
    const isSpecial = product.category === 'special-bouquets';
    const noteEl = document.getElementById('item-note');
    
    if (isSpecial && (!noteEl || noteEl.value.trim() === "")) {
        const msg = currentLang === 'ar' ? "مش مجرد ورد دي حكاية مرسومة بإيد .. اكتبي الحكاية عشان نرسمها على الكارت" : "Write the story to draw it on the card";
        showToast(msg);
        return;
    }

    let specs = [];
    document.querySelectorAll('.opt-select').forEach(sel => {
        specs.push(`${sel.dataset.cat}: ${sel.value}`);
    });
    if (noteEl) specs.push(`Note: ${noteEl.value}`);

    const cartItem = {
        id: product.id + '-' + Date.now(), // Unique ID for custom variants
        baseId: product.id,
        name: currentLang === 'ar' ? product.nameAr : product.name,
        price: parseFloat(document.getElementById('display-price').textContent),
        qty: 1,
        specifications: specs.join(' | '),
        emoji: product.emoji
    };

    const cart = JSON.parse(localStorage.getItem('lb_cart') || '[]');
    cart.push(cartItem);
    localStorage.setItem('lb_cart', JSON.stringify(cart));
    
    window.location.href = 'cart.html';
  }

  async function loadData() {
    const id = new URLSearchParams(window.location.search).get('id');
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getProduct&id=${id}`);
    const data = await res.json();
    product = data.product;
    options = data.options || [];
    renderProduct();
    updateCartCount();
  }

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('lb_cart') || '[]');
    document.getElementById('cart-count').textContent = cart.reduce((s,i)=>s+i.qty,0);
  }

  setLang(currentLang);
  loadData();
</script>
</body>
</html>
