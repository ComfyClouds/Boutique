<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details – Lovers Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5EFE0;
      --warm-white: #FAF6EE;
      --bark: #6B4F35;
      --moss: #6B7A5A;
      --clay: #B07D5C;
      --sand: #D4B896;
      --charcoal: #2C2416;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--warm-white); color: var(--charcoal); font-family: 'Lato', sans-serif; font-weight: 300; line-height: 1.6; }
    body.ar { font-family: 'Amiri', serif; direction: rtl; }

    nav { background: var(--warm-white); border-bottom: 1px solid rgba(107,79,53,0.12); padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; text-decoration: none; color: var(--charcoal); }
    .nav-brand em { font-style: italic; color: var(--bark); }

    .lang-toggle { display: flex; gap: 8px; }
    .lang-btn { background: transparent; border: 1px solid var(--bark); color: var(--bark); padding: 5px 12px; font-size: 11px; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s; }
    .lang-btn.active, .lang-btn:hover { background: var(--bark); color: var(--cream); }

    .product-container { max-width: 1200px; margin: 60px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    
    .product-media { background: var(--cream); aspect-ratio: 4/5; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .product-media img { width: 100%; height: 100%; object-fit: cover; }
    .product-media .emoji-fallback { font-size: 120px; }

    .product-info h1 { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; margin-bottom: 10px; color: var(--charcoal); }
    .product-category { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--clay); margin-bottom: 20px; display: block; }
    .product-price { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--bark); margin-bottom: 30px; }
    .product-description { font-size: 16px; color: #555; margin-bottom: 40px; max-width: 500px; }

    .qty-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
    .qty-btn { background: none; border: 1px solid var(--sand); width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .qty-btn:hover { background: var(--sand); }
    #qty-val { font-size: 18px; width: 30px; text-align: center; }

    .add-to-cart-btn { width: 100%; padding: 22px; background: var(--bark); color: var(--cream); border: none; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
    .add-to-cart-btn:hover { background: var(--charcoal); }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--charcoal); color: var(--cream); padding: 16px 30px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: 0; transition: 0.4s; z-index: 1000; }
    .toast.show { opacity: 1; }

    @media (max-width: 900px) {
      .product-container { grid-template-columns: 1fr; gap: 40px; margin: 20px auto; }
      nav { padding: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><em>Lovers</em> Boutique</a>
  <div class="lang-toggle">
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('ar')" id="btn-ar">ع</button>
  </div>
</nav>

<div class="product-container" id="product-content">
  </div>

<div id="toast" class="toast">Added to Cart</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyYgttHn568VmZxxvMb23hbz5cEwCw0a2rNUNpe4AK3XF_FnHtIJpY-48Vtiibz3iW/exec';
  let currentLang = localStorage.getItem('lb_lang') || 'en';
  let currentProduct = null;
  let quantity = 1;

  async function loadProduct() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    if (!productId) return window.location.href = 'index.html';

    try {
      const response = await fetch(`${APPS_SCRIPT_URL}?action=getProduct&id=${productId}`);
      const data = await response.json();
      if (data.product) {
        currentProduct = data.product;
        renderProduct();
      }
    } catch (e) {
      console.error("Error loading product", e);
    }
  }

  function renderProduct() {
    const container = document.getElementById('product-content');
    const name = currentLang === 'ar' ? currentProduct.nameAr : currentProduct.name;
    const desc = currentLang === 'ar' ? currentProduct.descAr : currentProduct.desc;
    const priceLabel = currentLang === 'ar' ? 'ج.م' : 'EGP';
    
    // IMAGE VS EMOJI LOGIC
    let mediaHtml = '';
    const mediaSource = currentProduct.emoji || '';
    if (mediaSource.startsWith('http')) {
      mediaHtml = `<img src="${mediaSource}" alt="${name}">`;
    } else {
      mediaHtml = `<span class="emoji-fallback">${mediaSource || '🌸'}</span>`;
    }

    container.innerHTML = `
      <div class="product-media">
        ${mediaHtml}
      </div>
      <div class="product-info">
        <span class="product-category">${currentProduct.category}</span>
        <h1>${name}</h1>
        <div class="product-price">${currentProduct.price} ${priceLabel}</div>
        <p class="product-description">${desc}</p>
        
        <div class="qty-selector">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="qty-val">${quantity}</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>

        <button class="add-to-cart-btn" onclick="addToCart()">
          ${currentLang === 'ar' ? 'إضافة إلى السلة' : 'Add to Cart'}
        </button>
      </div>
    `;
    updateLangUI();
  }

  function updateQty(val) {
    quantity = Math.max(1, quantity + val);
    document.getElementById('qty-val').innerText = quantity;
  }

  function addToCart() {
    let cart = JSON.parse(localStorage.getItem('lb_cart') || '[]');
    const existing = cart.find(item => item.id === currentProduct.id);
    
    if (existing) {
      existing.qty += quantity;
    } else {
      cart.push({
        id: currentProduct.id,
        name: currentProduct.name,
        nameAr: currentProduct.nameAr,
        price: currentProduct.price,
        emoji: currentProduct.emoji,
        qty: quantity
      });
    }
    
    localStorage.setItem('lb_cart', JSON.stringify(cart));
    showToast();
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.innerText = currentLang === 'ar' ? 'تمت الإضافة للسلة' : 'Added to Cart';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function setLang(l) {
    currentLang = l;
    localStorage.setItem('lb_lang', l);
    document.body.classList.toggle('ar', l === 'ar');
    if (currentProduct) renderProduct();
    updateLangUI();
  }

  function updateLangUI() {
    document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('btn-ar').classList.toggle('active', currentLang === 'ar');
  }

  setLang(currentLang);
  loadProduct();
</script>

</body>
</html>
