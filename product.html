<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product – Petal Tale</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
     :root {

      /* Lighter Strawberry Cream Palette */
      --cream: #FFFBFC;        /* Bright Milk: Nearly white with a tiny drop of pink */
      --warm-white: #FFF5F7;   /* Pale Frosting: Ultra-light pink for secondary sections */
      --bark:   #ffcfdf;         /* Soft Cocoa: Lightened brown-rose for headers and contrast */
      --moss: #DDBFC4;         /* Muted Blush: Gentle, desaturated pink for borders or dividers */
      --clay: #F9C5D1;         /* Fresh Strawberry: A bright, cheerful light pink */
      --sand: #FDE2E8;         /* Silk Petal: Very soft, high-key accent pink */
      --charcoal: #524144;     /* Deep Taupe: Softened dark tone for readability without harshness */
      --gold: #E5C76B;         /* Soft Gold: A brighter, paler gold to match the higher key */
      --white: #ffffff;
      --darkerpink: #db96a1;
      --darkerbtn: #3a2428;
       --bcream: #fffffd;
       --black: #030000;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bcream);color:var(--charcoal);font-family:'Lato',sans-serif;font-weight:300;}
    body.ar{font-family:'Amiri',serif;direction:rtl;}
    
    nav{background:var(--warm-white);border-bottom:1px solid rgba(107,79,53,0.12);padding:20px 60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;text-decoration:none;color:var(--charcoal);}
    .nav-brand em { font-style:italic; color:var(--darkerpink); }
    .nav-actions{display:flex;gap:20px;align-items:center;}
    .cart-btn {
      background:var(--darkerpink); color:var(--cream);
      border:none; padding:10px 22px; cursor:pointer;
      font-size:12px; letter-spacing:1.5px; font-family:'Lato',sans-serif;
      display:flex; align-items:center; gap:8px;
      text-decoration:none;
    }
        .cart-btn:hover { background:var(--charcoal); }
    .cart-count {
      background:var(--clay); color:#fff;
      border-radius:50%; width:18px; height:18px;
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:bold;
    }
    .lang-toggle { display:flex; gap:6px; }
    .lang-btn {
      background: var(--darkerpink);; border:1px solid var(--black);
      color:var(--bcream); padding:5px 12px; font-size:11px;
      letter-spacing:1.5px; cursor:pointer; font-family:'Lato',sans-serif;
      transition:all 0.3s;
    }
    .lang-btn.active, .lang-btn:hover { background:var(--charcoal); color:var(--bcream); }
    .breadcrumb{padding:24px 60px 0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--darkerpink);}
    .breadcrumb a{color:var(--darkerpink);text-decoration:none;}

    .product-page{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:70vh;max-width:1200px;margin:0 auto;padding:40px 60px 80px;}
    
    /* --- GALLERY FIXES --- */
    .product-gallery{padding-right:60px;}
    body.ar .product-gallery{padding-right:0;padding-left:60px;}
    
    .main-image{
        width:100%;
        aspect-ratio: 1 / 1;
        background: #fff;
        display:flex;
        align-items:center;
        justify-content:center;
        margin-bottom:16px;
        position:relative;
        overflow:hidden;
        border-radius: 8px;
        border: 1px solid var(--charcoal);
    }
    .main-image img{
        width:100%;
        height:100%;
        object-fit: contain; /* Prevents cropping the bouquet */
        padding: 15px; /* Adds breathing room around the product */
    }
    .emoji-display {
        font-size: 100px;
        line-height: 1;
    }
    /* -------------------- */

    .product-details{display:flex;flex-direction:column;gap:20px;padding-left:20px;}
    body.ar .product-details{padding-left:0;padding-right:20px;}
    .product-name-big{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,48px);font-weight:300;line-height:1.1;}
    .product-price-big{font-size:28px;color:var(--charcoal);font-family:'Cormorant Garamond',serif;}

    .customizer-box { background: rgba(107,79,53,0.05); padding: 20px; border-radius: 4px; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
    .opt-group { display: flex; flex-direction: column; gap: 6px; }
    .opt-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--clay); font-weight: bold; }
    .opt-select, .opt-textarea { 
        width: 100%; padding: 10px; border: 1px solid rgba(107,79,53,0.2); 
        background: white; font-family: inherit; font-size: 14px;
    }
    .opt-textarea { height: 80px; resize: none; }
    .opt-textarea.error { border-color: #C94C4C; background: #fff5f5; }

    .qty-section{display:flex;flex-direction:column;gap:12px;margin: 10px 0;}
    .qty-control{display:flex;align-items:center;gap:0;width:fit-content;border:1px solid rgba(107,79,53,0.25);}
    .qty-btn{background:none;border:none;width:40px;height:40px;cursor:pointer;font-size:18px;color:var(--bark);}
    .qty-display{width:50px;height:40px;border:none;border-left:1px solid rgba(107,79,53,0.2);border-right:1px solid rgba(107,79,53,0.2);text-align:center;font-size:16px;background:transparent;}
    
    .add-to-cart-btn{background:var(--darkerpink);color:var(--cream);border:none;padding:18px;cursor:pointer;font-size:11px;letter-spacing:3px;text-transform:uppercase;width:100%;transition: 0.3s;}
    .add-to-cart-btn:hover{background:var(--charcoal);}

    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #3D292C; color: white; padding: 12px 24px; border-radius: 40px; font-size: 13px; z-index: 999; display: none; }
    footer{background:var(--charcoal);color:var(--cream);padding:32px 60px;text-align:center;font-size:12px;margin-top:60px;}
    .loading { text-align:center; padding:100px; font-size:20px; color:var(--clay); font-style:italic; }

    @media(max-width:800px){
      .product-page{grid-template-columns:1fr;padding:24px;}
      .product-gallery{padding-right:0;margin-bottom:32px;}
      .product-details{padding-left:0;}
      nav{padding:16px 24px;}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><em>Petal</em> Tale</a>
  <div class="nav-actions">
    <div class="lang-toggle">
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
      <button class="lang-btn" onclick="setLang('ar')" id="btn-ar">ع</button>
    </div>
    <a href="cart.html" class="cart-btn">
      <span data-en="Cart" data-ar="السلة">Cart</span>
      <span class="cart-count" id="cart-count">0</span>
    </a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a> / 
  <a href="shop.html" data-en="Shop" data-ar="المتجر">Shop</a> / 
  <span id="breadcrumb-name">...</span>
</div>

<div id="toast"></div>

<div id="page-content">
  <div class="loading">Loading your blooms...</div>
</div>

<footer>
  <div class="footer-brand"><em>Petal</em> Tale | حكاية ورد</div>
  <p>© 2026 All rights reserved.</p>
</footer>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlHcwzaLAc4DxA6CLNCkyVQNNknpxldOOe1ofZLDiWpzcOIyCFzdIP_9mBgAUMvXXO/exec';
  let currentLang = localStorage.getItem('lb_lang') || 'en';
  let product = null;
  let options = [];
  let basePrice = 0;
  let currentQty = 1;

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lb_lang', lang);
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.body.classList.toggle('ar', lang === 'ar');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    if (product) renderProduct();
  }

  function showToast(en, ar) {
    const el = document.getElementById('toast');
    el.textContent = currentLang === 'ar' ? ar : en;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  function changeQty(delta) {
    currentQty = Math.max(1, currentQty + delta);
    const el = document.getElementById('qty-display');
    if (el) el.value = currentQty;
  }

  function updatePrice() {
    let extra = 0;
    document.querySelectorAll('.opt-select').forEach(sel => {
        const opt = sel.options[sel.selectedIndex];
        extra += parseFloat(opt.dataset.adj || 0);
    });
    const final = basePrice + extra;
    document.getElementById('display-price').textContent = final;
  }

  function renderProduct() {
    const p = product;
    const isSpecial = p.category === 'special-bouquets';
    const name = currentLang === 'ar' ? (p.nameAr || p.name) : p.name;
    const desc = currentLang === 'ar' ? (p.descAr || p.desc) : p.desc;
    
    document.getElementById('breadcrumb-name').textContent = name;
    
    const grouped = options.reduce((acc, opt) => {
        if (!acc[opt.category]) acc[opt.category] = [];
        acc[opt.category].push(opt);
        return acc;
    }, {});

    const hasOptions = Object.keys(grouped).length > 0;
    
    const optionsHtml = Object.keys(grouped).map(cat => `
        <div class="opt-group">
            <label class="opt-label">${cat}</label>
            <select class="opt-select" onchange="updatePrice()" data-cat="${cat}">
                ${grouped[cat].map(o => `
                    <option value="${o.name}" data-adj="${o.priceAdj}">
                        ${currentLang === 'ar' ? (o.nameAr || o.name) : o.name} ${o.priceAdj > 0 ? '(+' + o.priceAdj + ')' : ''}
                    </option>
                `).join('')}
            </select>
        </div>
    `).join('');

    /* Updated Media Rendering */
    const media = (p.emoji && p.emoji.includes('http')) 
        ? `<img src="${p.emoji}" alt="${name}">` 
        : `<span class="emoji-display">${p.emoji || '🌸'}</span>`;

    const customizerHtml = (hasOptions || isSpecial) ? `
      <div class="customizer-box">
        ${optionsHtml}
        ${isSpecial ? `
            <div class="opt-group">
                <label class="opt-label">${currentLang === 'ar' ? 'حكاية الورد' : 'The Story'}</label>
                <textarea class="opt-textarea" id="item-note" placeholder="${currentLang === 'ar' ? 'اكتبي الحكاية هنا...' : 'Write the story here...'}"></textarea>
            </div>
        ` : ''}
      </div>
    ` : '';

    document.getElementById('page-content').innerHTML = `
      <div class="product-page">
        <div class="product-gallery"><div class="main-image">${media}</div></div>
        <div class="product-details">
          <h1 class="product-name-big">${name}</h1>
          <div class="product-price-big"><span id="display-price">${p.price}</span><span>EGP</span></div>
          <p class="product-desc">${desc || ''}</p>
          
          ${customizerHtml}

          <div class="qty-section">
            <div class="opt-label">${currentLang === 'ar' ? 'الكمية' : 'Quantity'}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <input type="number" class="qty-display" id="qty-display" value="${currentQty}" readonly>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>

          <button class="add-to-cart-btn" onclick="handleAddToCart()">
            ${currentLang === 'ar' ? 'أضيفي للسلة' : 'Add to Cart'}
          </button>
        </div>
      </div>
    `;
    basePrice = p.price;
    updatePrice();
  }

  async function loadData() {
    const id = new URLSearchParams(window.location.search).get('id');
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getProduct&id=${id}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      product = data.product;
      options = data.options || [];
      renderProduct();
    } catch(e) {
      document.getElementById('page-content').innerHTML = '<div class="loading">Product not found.</div>';
    }
  }

  function handleAddToCart() {
    const isSpecial = product.category === 'special-bouquets';
    let noteValue = "";

    if (isSpecial) {
        const noteEl = document.getElementById('item-note');
        noteValue = noteEl.value.trim();
        if (!noteValue) {
            noteEl.classList.add('error');
            showToast("Please write the story first", "يرجى كتابة حكاية الورد أولاً");
            return;
        }
        noteEl.classList.remove('error');
    }

    const cart = JSON.parse(localStorage.getItem('lb_cart') || '[]');
    
    const specs = [];
    document.querySelectorAll('.opt-select').forEach(sel => {
        const label = sel.closest('.opt-group').querySelector('.opt-label').textContent;
        specs.push(`${label}: ${sel.value}`);
    });
    
    if (noteValue) specs.push(`Story: ${noteValue}`);
    const currentSpecsString = specs.join(' | ');

    const existingItem = cart.find(item => 
        item.baseId === product.id && 
        item.specifications === currentSpecsString
    );

    if (existingItem) {
        existingItem.qty += currentQty;
    } else {
        const cartItem = {
            id: product.id + '-' + Date.now(),
            baseId: product.id,
            name: currentLang === 'ar' ? (product.nameAr || product.name) : product.name,
            price: parseFloat(document.getElementById('display-price').textContent),
            qty: currentQty,
            specifications: currentSpecsString,
            emoji: product.emoji
        };
        cart.push(cartItem);
    }

    localStorage.setItem('lb_cart', JSON.stringify(cart));
    updateCartCount();
    showToast("Added to cart", "تم الإضافة للسلة");
  }

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('lb_cart') || '[]');
    const count = cart.reduce((s,i)=>s+i.qty,0);
    const el = document.getElementById('cart-count');
    if(el) el.textContent = count;
  }

  updateCartCount();
  loadData();
  setLang(currentLang);
</script>
</body>
</html>
