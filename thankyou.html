<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You – Petal Tale</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Strawberry Milk Palette */
      --cream: #FFF1F3;        /* Pale creamy pink */
      --warm-white: #FFEAEE;   /* Soft strawberry milk */
      --bark: #724A51;         /* Espresso Rose */
      --moss: #C49BA2;         /* Dusty Rose */
      --clay: #EFA8B6;         /* Strawberry Clay */
      --sand: #F7C8D1;         /* Soft Petal pink */
      --charcoal: #3D292C;     /* Dark Berry-Charcoal */
      --gold: #D4AF37;         /* Classic gold accent */
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--warm-white);color:var(--charcoal);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
    body.ar{font-family:'Amiri',serif;direction:rtl;}

    nav{background:var(--warm-white);border-bottom:1px solid rgba(107,79,53,0.12);padding:20px 60px;display:flex;align-items:center;justify-content:space-between;}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;text-decoration:none;color:var(--charcoal);}
    .nav-brand em{font-style:italic;color:var(--bark);}
    .lang-toggle{display:flex;gap:6px;}
    .lang-btn{background:transparent;border:1px solid var(--bark);color:var(--bark);padding:5px 12px;font-size:11px;letter-spacing:1.5px;cursor:pointer;font-family:'Lato',sans-serif;transition:all 0.3s;}
    .lang-btn.active,.lang-btn:hover{background:var(--bark);color:var(--cream);}

    main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;}

    .thankyou-card{
      max-width:700px;width:100%;
      background:var(--cream);
      padding:72px 64px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .thankyou-card::before{
      content:'';position:absolute;top:-80px;left:-80px;
      width:280px;height:280px;
      background:radial-gradient(circle,rgba(176,125,92,0.1) 0%,transparent 70%);
      border-radius:50%;
    }
    .thankyou-card::after{
      content:'';position:absolute;bottom:-60px;right:-60px;
      width:220px;height:220px;
      background:radial-gradient(circle,rgba(107,122,90,0.08) 0%,transparent 70%);
      border-radius:50%;
    }

    .success-icon{
      font-size:72px;margin-bottom:24px;
      animation:pop 0.5s ease;
      display:block;position:relative;z-index:1;
    }
    @keyframes pop{0%{transform:scale(0.5);opacity:0;}80%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

    .thankyou-title{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(36px,5vw,56px);font-weight:300;
      line-height:1.1;margin-bottom:16px;
      position:relative;z-index:1;
    }
    .thankyou-title em{font-style:italic;color:var(--bark);}

    .order-id-badge{
      display:inline-block;
      background:var(--bark);color:var(--cream);
      padding:8px 24px;font-size:12px;letter-spacing:3px;
      text-transform:uppercase;margin:20px 0 28px;
      position:relative;z-index:1;
    }

    .thankyou-msg{
      font-size:15px;line-height:1.9;color:#7A6A55;
      margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto;
      position:relative;z-index:1;
    }

    .order-items-preview{
      background:var(--warm-white);padding:24px;margin-bottom:32px;
      text-align:left;position:relative;z-index:1;
    }
    body.ar .order-items-preview{text-align:right;}
    .order-items-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);margin-bottom:16px;}
    
    .order-item-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(107,79,53,0.08);font-size:13px;}
    .order-item-row:last-child{border-bottom:none;}
    .order-item-left{display:flex;align-items:center;gap:12px;}
    
    .order-item-img{width:32px;height:40px;background:var(--warm-white);overflow:hidden;flex-shrink:0;}
    .order-item-img img{width:100%;height:100%;object-fit:cover;}
    
    .order-total-row{display:flex;justify-content:space-between;padding:16px 0 0;font-family:'Cormorant Garamond',serif;font-size:20px;border-top:1px solid rgba(107,79,53,0.15);}

    .cta-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
    .btn-primary{background:var(--bark);color:var(--cream);padding:16px 32px;text-decoration:none;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;transition:background 0.3s;}
    .btn-primary:hover{background:var(--charcoal);}
    .btn-secondary{background:transparent;color:var(--bark);border:1px solid var(--bark);padding:16px 32px;text-decoration:none;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;transition:all 0.3s;}
    .btn-secondary:hover{background:var(--cream);}

    .petal{position:fixed;font-size:20px;pointer-events:none;animation:fall linear forwards;}
    @keyframes fall{0%{transform:translateY(-40px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}

    footer{background:var(--bark);color:var(--cream);padding:28px 60px;text-align:center;font-size:12px;}
    footer .footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:6px;}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><em>Petal</em> Tale</a>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('ar')" id="btn-ar">ع</button>
  </div>
</nav>

<main>
  <div class="thankyou-card" id="thankyou-card">
    <span class="success-icon">🌸</span>
    <h1 class="thankyou-title" id="ty-title">Thank <em>you!</em></h1>
    <div class="order-id-badge" id="order-id-badge">Order #</div>
    <p class="thankyou-msg" id="ty-msg"></p>
    <div class="order-items-preview" id="order-items-preview"></div>
    <div class="cta-buttons">
      <a href="shop.html" class="btn-primary" data-en="Shop More →" data-ar="تسوقي أكثر →">Shop More →</a>
      <a href="index.html" class="btn-secondary" data-en="Back to Home" data-ar="العودة للرئيسية">Back to Home</a>
    </div>
  </div>
</main>

<footer>
  <div class="footer-brand"><em>Petal</em> Tale | حكاية ورد</div>
  <p data-en="© 2026 All rights reserved." data-ar="© 2026 جميع الحقوق محفوظة.">© 2026 All rights reserved.</p>
</footer>

<script>
  let currentLang = localStorage.getItem('lb_lang') || 'en';

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lb_lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.body.classList.toggle('ar', lang === 'ar');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    document.querySelectorAll('[data-en]').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (val) el.innerHTML = val;
    });
    renderOrder();
  }

  function renderOrder() {
    const orderStr = localStorage.getItem('lb_last_order');
    const preview = document.getElementById('order-items-preview');
    const badge = document.getElementById('order-id-badge');
    const titleEl = document.getElementById('ty-title');
    const msgEl = document.getElementById('ty-msg');

    if (!orderStr) {
      badge.style.display = 'none';
      titleEl.innerHTML = currentLang === 'ar' ? 'مرحباً بكِ!' : 'Welcome!';
      msgEl.textContent = currentLang === 'ar' ? 'لا يوجد طلبات حديثة لعرضها.' : 'No recent order found to display.';
      preview.innerHTML = '';
      return;
    }

    const order = JSON.parse(orderStr);
    const priceLbl = currentLang === 'ar' ? 'ج.م' : 'EGP';

    badge.style.display = 'inline-block';
    badge.textContent = (currentLang === 'ar' ? 'طلب رقم #' : 'Order #') + (order.orderId || '---');

    if (currentLang === 'ar') {
      titleEl.innerHTML = `شكراً لكِ <em>${order.name || ''}!</em>`;
    } else {
      titleEl.innerHTML = `Thank you, <em>${order.name || ''}!</em>`;
    }

    msgEl.textContent = currentLang === 'ar'
      ? 'تم استقبال طلبك وبدأنا نُعدّ زهورك بكل حب. سنتواصل معكِ قريباً لتأكيد تفاصيل التوصيل عبر واتساب.'
      : 'Your order has been received and we\'re already preparing your blooms with love. We\'ll be in touch soon to confirm your delivery details via WhatsApp.';

    if (order.items && order.items.length) {
      const rows = order.items.map(item => {
        const name = currentLang === 'ar' ? (item.nameAr || item.name) : item.name;
        const imgDisplay = (item.emoji && item.emoji.includes('http')) 
            ? `<div class="order-item-img"><img src="${item.emoji}"></div>` 
            : `<span style="margin-right:10px">${item.emoji || '🌸'}</span>`;

        return `<div class="order-item-row">
          <div class="order-item-left">
            ${imgDisplay}
            <span>${name} × ${item.qty}</span>
          </div>
          <span>${item.price * item.qty} ${priceLbl}</span>
        </div>`;
      }).join('');

      preview.innerHTML = `
        <div class="order-items-title">${currentLang === 'ar' ? 'تفاصيل الطلب' : 'Order Details'}</div>
        ${rows}
        <div class="order-total-row">
          <span>${currentLang === 'ar' ? 'الإجمالي' : 'Total'}</span>
          <span>${order.total} ${priceLbl}</span>
        </div>`;
    }
  }

  function launchPetals() {
    const petals = ['🌸','🌺','🌹','🌼','💐','🌿','🍃'];
    for (let i = 0; i < 18; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = petals[Math.floor(Math.random() * petals.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (2 + Math.random() * 3) + 's';
        p.style.animationDelay = (Math.random() * 0.5) + 's';
        p.style.fontSize = (16 + Math.random() * 20) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
      }, i * 120);
    }
  }

  setLang(currentLang);
  launchPetals();
</script>
</body>
</html>
